<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="-90 -350 640 480">
 <title>Reeve tetrahedrons</title>
 <desc>Comparison of Reeve tetrahedra with different ''r'' values by CMG Lee, showing that Pick's theorem does not apply in three or more dimensions.</desc>
 <style type="text/css">
.main   { font-family:Helvetica,Arial,sans-serif; font-size:20px; text-anchor:middle;
          fill:#0099ff; stroke:#0000ff; stroke-width:3; stroke-linejoin:round; }
.cube   { fill:none; stroke:#000000; stroke-opacity:0.25; }
.var    { font-style:italic; }
.marker { marker-start:url(#marker); marker-mid:url(#marker); marker-end:url(#marker); }
.fade   { fill-opacity:0.6; }
.stats  { font-size:36px; text-anchor:start; }
text    { fill:#000000; stroke:none; }
 </style>
 <defs>
  <marker id="marker" markerWidth="8" markerHeight="8" refX="4" refY="4">
   <circle cx="4" cy="4" r="2" fill="#00cc99" stroke="#000000"/>
  </marker>
  <path id="top" class="cube" d="M 0,-100 h 100 l -40,-30 h -100 z"/>
  <g id="cube" class="cube">
   <path d="M 100,0 l -40,-30 h -100 m 100,0 v -100" stroke-dasharray="4,4"/>
   <path d="M 0,0 v -100 M 100,-100 v 100 H 0 l -40,-30 v -100"/>
  </g>
  <g id="common">
   <use xlink:href="#cube"/>
   <text x="-25" y="-30" dy="2.4ex" text-anchor="end">(0,&#8202;0,&#8202;0)</text>
   <text x="99"  y="-30" dy="2.4ex" text-anchor="end">(0,&#8202;1,&#8202;0)</text>
   <text x="0"   y="0"   dy="2.4ex">(1,&#8202;0,&#8202;0)</text>
  </g>
 </defs>
 <circle cx="0" cy="0" r="99999" fill="#ffffff"/>
 <g class="main">
  <g transform="translate(0,0)">
   <path class="marker"      d="M 0,0 L  60,-30 L 100,-100 Z"/>
   <path class="marker fade" d="M 0,0 L -40,-30 L 100,-100"/>
   <use xlink:href="#common"/>
   <use xlink:href="#top"/>
   <text x="110" y="-100" dy="-2ex">(1,&#8202;1,&#8202;1)</text>
   <text class="stats" transform="translate(-85,75)" x="0" y="0"
    ><tspan class="var">r</tspan><tspan>&#8202;=1,&#8201;</tspan
    ><tspan class="var">b</tspan><tspan>&#8201;=&#8202;4,</tspan
    ><tspan class="var" x="0" dy="2ex">i</tspan><tspan>&#8201;=&#8202;0,</tspan
    ><tspan class="var">V</tspan><tspan>&#8201;=1/6</tspan></text>
  </g>
  <g transform="translate(200,0)">
   <path class="marker"      d="M 0,0 L  60,-30 L 100,-200 Z"/>
   <path class="marker fade" d="M 0,0 L -40,-30 L 100,-200"/>
   <use xlink:href="#common"/>
   <use xlink:href="#cube" transform="translate(0,-100)"/>
   <use xlink:href="#top"  transform="translate(0,-100)"/>
   <text x="110" y="-200" dy="-2ex">(1,&#8202;1,&#8202;2)</text>
   <text class="stats" transform="translate(-75,75)" x="0" y="0"
    ><tspan class="var">r</tspan><tspan>&#8202;=2,&#8202;</tspan
    ><tspan class="var">b</tspan><tspan>&#8201;=&#8202;4,</tspan
    ><tspan class="var" x="0" dy="2ex">i</tspan><tspan>&#8201;=&#8202;0,</tspan
    ><tspan class="var">V</tspan><tspan>&#8201;=1/3</tspan></text>
  </g>
  <g transform="translate(400,0)">
   <path class="marker"      d="M 0,0 L  60,-30 L 100,-300 Z"/>
   <path class="marker fade" d="M 0,0 L -40,-30 L 100,-300"/>
   <use xlink:href="#common"/>
   <use xlink:href="#cube" transform="translate(0,-100)"/>
   <use xlink:href="#cube" transform="translate(0,-200)"/>
   <use xlink:href="#top"  transform="translate(0,-200)"/>
   <text x="110" y="-300" dy="-2ex">(1,&#8202;1,&#8202;3)</text>
   <text class="stats" transform="translate(-65,75)" x="0" y="0"
    ><tspan class="var">r</tspan><tspan>&#8202;=3,&#8202;</tspan
    ><tspan class="var">b</tspan><tspan>&#8201;=&#8202;4,</tspan
    ><tspan class="var" x="0" dy="2ex">i</tspan><tspan>&#8201;=&#8202;0,</tspan
    ><tspan class="var">V</tspan><tspan>&#8201;=1/2</tspan></text>
  </g>
 </g>
</svg>
